<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script>
        (function() {
            const referrer = document.referrer;
            if (referrer && (referrer.includes('/ecosystem') || referrer.includes('localhost') || referrer.includes('127.0.0.1') || referrer.includes('duckdns.org'))) {
                window.location.href = referrer;
            } else if (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1') {
                window.location.href = 'http://localhost:5173/ecosystem';
            }
        })();
    </script>
    <title>Brand — Apartado Estratégico de Marca</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Urbanist:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        :root {
            --bg-base: #0f172a;
            --bg-panel: rgba(15, 23, 42, 0.7);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border-glass: rgba(255, 255, 255, 0.05);
            --kpi-green:  #10b981;
            --kpi-blue:   #3b82f6;
            --kpi-indigo: #4f46e5;
            --kpi-purple: #a855f7;
            --kpi-orange: #f59e0b;
            --kpi-pink:   #ec4899;
            --kpi-red:    #ef4444;
            --kpi-cyan:   #06b6d4;
            --kpi-teal:   #14b8a6;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: var(--bg-base);
            background-image:
                radial-gradient(circle at 15% 50%, rgba(59,130,246,0.08), transparent 25%),
                radial-gradient(circle at 85% 30%, rgba(168,85,247,0.08), transparent 25%);
            font-family: 'Urbanist', sans-serif;
            color: var(--text-main);
            min-height: 100vh;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* =========================================
           HEADER & PROGRESS
        ========================================= */
        .map-header {
            text-align: center;
            margin-bottom: 40px;
            max-width: 800px;
            animation: fadeInDown 0.8s ease-out;
        }
        .map-header h1 { font-size: 48px; font-weight: 900; letter-spacing: -1px; margin-bottom: 10px; }
        .map-header p  { font-size: 18px; color: var(--text-muted); line-height: 1.5; margin-bottom: 30px; }

        .progress-container {
            display: flex; align-items: center; justify-content: center; gap: 20px;
            background: rgba(0,0,0,0.3); border: 1px solid var(--border-glass);
            padding: 15px 30px; border-radius: 100px;
            width: fit-content; margin: 0 auto;
        }
        .progress-text { text-align: left; }
        .progress-text strong { display: block; font-size: 18px; color: var(--kpi-blue); }
        .progress-text span   { font-size: 12px; color: var(--text-muted); text-transform: uppercase; font-weight: bold; letter-spacing: 1px; }
        .progress-bar-bg  { width: 200px; height: 8px; background: rgba(255,255,255,0.1); border-radius: 10px; overflow: hidden; }
        .progress-bar-fill{ height: 100%; background: var(--kpi-blue); transition: width 1s cubic-bezier(0.16,1,0.3,1); box-shadow: 0 0 10px var(--kpi-blue); }

        /* =========================================
           WRAPPER
        ========================================= */
        .ecosystem-wrapper {
            max-width: 1400px; width: 100%;
            display: flex; flex-direction: column; gap: 40px;
            animation: fadeIn 1s ease-out;
        }

        /* =========================================
           SECTION HEADERS
        ========================================= */
        .category-header {
            font-size: 14px; font-weight: 800; color: var(--text-muted);
            text-transform: uppercase; letter-spacing: 1.5px;
            margin-bottom: 10px;
            display: flex; align-items: center; gap: 10px;
            border-bottom: 1px solid var(--border-glass);
            padding-bottom: 10px;
        }
        .center-header { justify-content: center; margin-top: 20px; }

        /* =========================================
           GRIDS
        ========================================= */
        .pillars-row {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 40px;
        }
        .category-column { display: flex; flex-direction: column; gap: 15px; }

        .bottom-grid {
            display: flex; flex-wrap: wrap; justify-content: center; gap: 20px;
        }
        .bottom-grid .module-card { width: calc(33.333% - 14px); }

        /* =========================================
           MODULE CARDS
        ========================================= */
        .module-card {
            background: var(--bg-panel); backdrop-filter: blur(12px);
            border: 1px solid var(--border-glass); border-radius: 16px;
            padding: 20px; text-decoration: none;
            display: flex; align-items: center; gap: 15px;
            transition: all 0.3s ease; position: relative; overflow: hidden; cursor: pointer;
        }
        .module-card:hover {
            transform: translateY(-4px);
            background: rgba(30,41,59,0.9);
            box-shadow: 0 15px 30px rgba(0,0,0,0.4);
            border-color: rgba(255,255,255,0.15);
        }
        .module-card.visited { border-left: 4px solid var(--kpi-green); }
        .module-card.visited .status-indicator {
            background: rgba(16,185,129,0.2); border-color: var(--kpi-green);
            color: var(--kpi-green); box-shadow: 0 0 10px rgba(16,185,129,0.3);
        }

        .module-icon {
            width: 50px; height: 50px; border-radius: 12px;
            background: rgba(0,0,0,0.3);
            display: flex; align-items: center; justify-content: center;
            font-size: 20px; flex-shrink: 0; transition: 0.3s;
        }
        .module-info { display: flex; flex-direction: column; gap: 4px; flex: 1; }
        .module-info strong { font-size: 16px; color: var(--text-main); font-weight: 800; }
        .module-info span   { font-size: 12px; color: var(--text-muted); font-weight: 600; line-height: 1.4; }

        .status-indicator {
            width: 24px; height: 24px; border-radius: 50%;
            background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
            display: flex; align-items: center; justify-content: center;
            color: transparent; font-size: 10px; transition: 0.3s; flex-shrink: 0;
        }

        /* HERO card */
        .card-hero {
            background: linear-gradient(135deg, rgba(30,41,59,0.9) 0%, rgba(15,23,42,0.9) 100%);
            border: 1px solid var(--kpi-blue);
            box-shadow: 0 0 30px rgba(59,130,246,0.15);
            padding: 30px; width: 100%;
        }
        .card-hero .module-icon { width: 70px; height: 70px; font-size: 30px; background: rgba(59,130,246,0.2); color: var(--kpi-blue); }
        .card-hero .module-info strong { font-size: 24px; }
        .card-hero .module-info span   { font-size: 15px; }

        /* =========================================
           RESET BTN
        ========================================= */
        .btn-reset {
            margin-top: 50px; background: transparent;
            border: 1px solid rgba(255,255,255,0.1); color: var(--text-muted);
            padding: 8px 16px; border-radius: 8px; font-size: 12px;
            font-weight: bold; cursor: pointer; transition: 0.2s; font-family: inherit;
        }
        .btn-reset:hover { color: white; background: rgba(255,255,255,0.05); }

        /* =========================================
           ANIMACIONES
        ========================================= */
        @keyframes fadeInDown { from { opacity:0; transform:translateY(-20px); } to { opacity:1; transform:translateY(0); } }
        @keyframes fadeIn     { from { opacity:0; } to { opacity:1; } }

        /* =========================================
           RESPONSIVE
        ========================================= */
        @media (max-width: 1200px) { .bottom-grid .module-card { width: calc(50% - 10px); } }
        @media (max-width: 768px) {
            .pillars-row { grid-template-columns: 1fr; gap: 40px; }
            .bottom-grid .module-card { width: 100%; }
            .map-header h1 { font-size: 36px; }
            .progress-container { flex-direction: column; text-align: center; gap: 10px; }
            .progress-text { text-align: center; }
            .category-header.center-header { justify-content: flex-start; }
        }
    </style>
</head>
<body>

    <!-- HEADER -->
    <div class="map-header">
        <h1>Apartado de Marca</h1>
        <p>El nivel estratégico de la red. Acá se definen los estándares, el catálogo maestro, el equipo y las comunicaciones que heredan todas las sedes. Hacé clic en cada módulo para explorarlo.</p>

        <div class="progress-container">
            <div class="progress-text">
                <strong id="progressCount">0 / 6</strong>
                <span>Módulos Explorados</span>
            </div>
            <div class="progress-bar-bg">
                <div class="progress-bar-fill" id="progressBar"></div>
            </div>
        </div>
    </div>

    <div class="ecosystem-wrapper">

        <!-- HERO -->
        <div id="dashboard-container"></div>

        <!-- COLUMNAS: Gestión de Red + Identidad de Marca -->
        <div class="pillars-row">
            <div class="category-column" id="col-red">
                <div class="category-header">
                    <i class="fas fa-network-wired" style="color: var(--kpi-blue);"></i>
                    Gestión de Red
                </div>
            </div>
            <div class="category-column" id="col-identidad">
                <div class="category-header">
                    <i class="fas fa-paint-brush" style="color: var(--kpi-pink);"></i>
                    Identidad y Comunicación
                </div>
            </div>
        </div>

        <!-- FILA INFERIOR: Operaciones -->
        <div>
            <div class="category-header center-header">
                <i class="fas fa-gears" style="color: var(--kpi-teal);"></i>
                Configuración Global
            </div>
            <div class="bottom-grid" id="col-config"></div>
        </div>

    </div>

    <button class="btn-reset" onclick="resetProgress()">
        <i class="fas fa-undo" style="margin-right: 6px;"></i> Reiniciar Progreso
    </button>

    <script>
        const modules = [
            // HERO
            {
                id: 'home',
                name: 'Dashboard de Marca',
                desc: 'El panorama ejecutivo: KPIs agregados de toda la red, alertas operativas y acciones rápidas a cada módulo.',
                file: 'home.html',
                icon: 'fas fa-crown',
                color: '#3b82f6',
                target: 'dashboard'
            },

            // Gestión de Red
            {
                id: 'red',
                name: 'Red',
                desc: 'Tabla de mando de todas las sedes. Comparás ventas, estado operativo, desvíos de catálogo y permisos de edición.',
                file: 'red.html',
                icon: 'fas fa-network-wired',
                color: '#3b82f6',
                target: 'col-red'
            },
            {
                id: 'talento',
                name: 'Talento',
                desc: 'Gestión de equipos a nivel red. Transferencias entre sedes, roles, cobertura y tensión operativa por local.',
                file: 'talento.html',
                icon: 'fas fa-users',
                color: '#a855f7',
                target: 'col-red'
            },
            {
                id: 'catalogo',
                name: 'Catálogo Maestro',
                desc: 'El catálogo que heredan todas las sedes. Radar de adopción, oficialización de productos y desvíos comerciales.',
                file: 'catalogo.html',
                icon: 'fas fa-layer-group',
                color: '#06b6d4',
                target: 'col-red'
            },

            // Identidad y Comunicación
            {
                id: 'estandares',
                name: 'Estándares',
                desc: 'Logo, banner y redes sociales como base heredada por la red. Control de alineación visual y desvíos de identidad.',
                file: 'estandares.html',
                icon: 'fas fa-ruler-combined',
                color: '#4f46e5',
                target: 'col-identidad'
            },
            {
                id: 'mensajes',
                name: 'Mensajes Clave',
                desc: 'Respuestas automáticas, tono de marca y campañas definidas una vez para toda la red.',
                file: 'mensajes.html',
                icon: 'fas fa-comment-dots',
                color: '#ec4899',
                target: 'col-identidad'
            },

            // Configuración Global
            {
                id: 'settings',
                name: 'Ajustes de Marca',
                desc: 'Perfil global, slug, dominio personalizado y estado operativo de la marca.',
                file: 'settings.html',
                icon: 'fas fa-gear',
                color: '#14b8a6',
                target: 'col-config'
            },
        ];

        function renderModules() {
            let visitedCount = 0;

            modules.forEach(mod => {
                const isVisited = localStorage.getItem(`brand_visited_${mod.id}`) === 'true';
                if (isVisited) visitedCount++;

                const isHero = mod.target === 'dashboard';

                const cardHTML = `
                    <a href="${mod.file}" onclick="markVisited('${mod.id}')" class="module-card ${isHero ? 'card-hero' : ''} ${isVisited ? 'visited' : ''}">
                        <div class="module-icon" style="color: ${mod.color};"><i class="${mod.icon}"></i></div>
                        <div class="module-info">
                            <strong>${mod.name}</strong>
                            <span>${mod.desc}</span>
                        </div>
                        <div class="status-indicator">
                            <i class="fas fa-check"></i>
                        </div>
                    </a>
                `;

                if (isHero) {
                    document.getElementById('dashboard-container').innerHTML = cardHTML;
                } else if (mod.target === 'col-config') {
                    document.getElementById('col-config').insertAdjacentHTML('beforeend', cardHTML);
                } else {
                    const col = document.getElementById(mod.target);
                    if (col) col.insertAdjacentHTML('beforeend', cardHTML);
                }
            });

            updateProgress(visitedCount);
        }

        function markVisited(id) {
            localStorage.setItem(`brand_visited_${id}`, 'true');
        }

        function updateProgress(count) {
            const total = modules.length;
            document.getElementById('progressCount').innerText = `${count} / ${total}`;
            document.getElementById('progressBar').style.width = `${(count / total) * 100}%`;
        }

        function resetProgress() {
            modules.forEach(mod => localStorage.removeItem(`brand_visited_${mod.id}`));
            location.reload();
        }

        renderModules();
    </script>

</body>
</html>
